<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Rostro Tecnológico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(90deg, #021b30 0%, #042a48 45%, #05355c 100%);
            overflow: hidden;
            position: relative;
        }

        /* Fondo de circuitos */
        .circuitos-fondo {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(0, 180, 220, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 180, 220, 0.15) 1px, transparent 1px);
            background-size: 50px 25px;
            opacity: 0.6;
        }

        /* Líneas de conexión */
        .lineas-conexion {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(60deg, transparent 48%, #00ccff 49%, #00ccff 51%, transparent 52%),
                linear-gradient(-60deg, transparent 48%, #00ccff 49%, #00ccff 51%, transparent 52%);
            background-size: 120px 80px;
            opacity: 0.3;
        }

        /* Contenedor rostro */
        .rostro-ia {
            position: absolute;
            top: 50%;
            left: 58%;
            transform: translate(-50%, -50%);
            width: 720px;
            height: 560px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 720 560" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="malla" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M0 20 L20 0 M20 20 L0 0" stroke="rgba(0,220,255,0.7)" stroke-width="0.8"/><circle cx="10" cy="10" r="1.2" fill="#00eeff"/></pattern></defs><path d="M360,20 C450,10 580,50 630,140 C660,210 640,290 600,360 C540,420 450,470 350,490 C280,470 220,410 190,330 C170,250 200,160 270,80 C310,40 350,25 360,20 Z" fill="none" stroke="url(%23malla)" stroke-width="1.5"/><path d="M280,220 Q320,200 360,210 Q400,220 420,260 Q400,300 360,320 Q310,330 280,290 Z" fill="none" stroke="rgba(0,230,255,0.8)" stroke-width="1.2"/><circle cx="330" cy="245" r="5" fill="#00eeff" filter="drop-shadow(0 0 10px #00eeff)"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 30px rgba(0,220,255,0.5));
        }

        /* Círculo principal AI */
        .ai-contenedor {
            position: absolute;
            top: 22%;
            right: 12%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .anillo-exterior {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 1.5px solid rgba(0,220,255,0.6);
            border-top-color: #00eeff;
            border-right-color: #00eeff;
            animation: girar 12s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .anillo-medio {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid rgba(0,210,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(0,200,255,0.4);
        }

        .circulo-centro {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, #0099cc 0%, #004488 60%, #002255 100%);
            border: 3px solid #00e5ff;
            box-shadow: 
                inset 0 0 20px rgba(0,255,255,0.3),
                0 0 35px #00ccff,
                0 0 70px rgba(0,180,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulso 3s ease-in-out infinite alternate;
        }

        .texto-ai {
            font-size: 70px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: #ffffff;
            text-shadow: 0 0 15px #00e5ff;
            letter-spacing: 2px;
        }

        /* Animaciones */
        @keyframes girar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulso {
            0% { transform: scale(1); }
            100% { transform: scale(1.06); }
        }

        /* Adaptación móvil */
        @media (max-width: 768px) {
            .rostro-ia {
                width: 520px;
                height: 400px;
                left: 55%;
            }
            .anillo-exterior { width: 190px; height: 190px; }
            .anillo-medio { width: 160px; height: 160px; }
            .circulo-centro { width: 130px; height: 130px; }
            .texto-ai { font-size: 55px; }
        }

        @media (max-width: 480px) {
            .rostro-ia {
                width: 420px;
                height: 320px;
                left: 52%;
            }
            .anillo-exterior { width: 160px; height: 160px; }
            .anillo-medio { width: 135px; height: 135px; }
            .circulo-centro { width: 110px; height: 110px; }
            .texto-ai { font-size: 45px; }
        }
    </style>
</head>
<body>
    <div class="circuitos-fondo"></div>
    <div class="lineas-conexion"></div>
    <div class="rostro-ia"></div>
    <div class="ai-contenedor">
        <div class="anillo-exterior">
            <div class="anillo-medio">
                <div class="circulo-centro">
                    <span class="texto-ai">AI</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
