<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portada IA - GitHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* FONDO IGUAL A LA IMAGEN */
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #061a2b 0%, #0c2c42 40%, #103a57 70%, #0a2438 100%);
            position: relative;
        }

        /* LÍNEAS DE CIRCUITOS DEL FONDO */
        .circuitos {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(0, 180, 255, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 180, 255, 0.1) 1px, transparent 1px);
            background-size: 60px 30px;
            opacity: 0.6;
        }

        /* CABEZA DE IA CON EFECTO DE RED GEOMÉTRICA */
        .cabeza-ia {
            position: absolute;
            top: 50%;
            left: 55%;
            transform: translate(-50%, -50%);
            width: 750px;
            height: 550px;
            background: radial-gradient(circle at 30% 40%, rgba(0, 220, 255, 0.25) 0%, transparent 55%);
            clip-path: polygon(
                45% 5%, 65% 8%, 82% 22%, 90% 40%, 88% 62%, 78% 80%, 62% 92%, 45% 95%,
                32% 88%, 22% 72%, 18% 55%, 22% 38%, 30% 22%, 42% 10%
            );
            box-shadow: 0 0 80px rgba(0, 200, 255, 0.3);
        }

        /* LÍNEAS Y PUNTOS DE LA RED */
        .cabeza-ia::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(45deg, rgba(0, 230, 255, 0.4) 1px, transparent 1px),
                radial-gradient(rgba(0, 255, 255, 0.6) 2px, transparent 2px);
            background-size: 25px 25px;
            opacity: 0.8;
            animation: brillo-suave 3s ease-in-out infinite alternate;
        }

        /* OJO LUMINOSO */
        .ojo {
            position: absolute;
            top: 42%;
            left: 28%;
            width: 22px;
            height: 12px;
            background: #00e5ff;
            border-radius: 50%;
            box-shadow: 0 0 25px 8px rgba(0, 229, 255, 0.7);
            animation: parpadeo 4s infinite;
        }

        /* CÍRCULO CENTRAL CON TEXTO AI */
        .circulo-ai {
            position: absolute;
            top: 28%;
            right: 8%;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, #0099cc 0%, #005588 60%, #003355 100%);
            border: 4px solid #00e0ff;
            box-shadow: 
                0 0 40px rgba(0, 220, 255, 0.6),
                inset 0 0 30px rgba(0, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulso 2.5s ease-in-out infinite;
        }

        .circulo-ai span {
            font-size: 85px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 15px #00e0ff;
            letter-spacing: 2px;
        }

        /* ANILLO DE PUNTOS ALREDEDOR DEL CÍRCULO */
        .anillo-puntos {
            position: absolute;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 2px dashed rgba(0, 220, 255, 0.5);
            animation: girar 12s linear infinite;
        }

        /* ANIMACIONES */
        @keyframes pulso {
            0% { transform: scale(1); box-shadow: 0 0 40px rgba(0, 220, 255, 0.6); }
            100% { transform: scale(1.05); box-shadow: 0 0 60px rgba(0, 220, 255, 0.8); }
        }

        @keyframes girar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes parpadeo {
            0%, 90%, 100% { opacity: 1; }
            95% { opacity: 0.3; }
        }

        @keyframes brillo-suave {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* AJUSTE PARA CELULARES */
        @media (max-width: 768px) {
            .cabeza-ia { width: 500px; height: 380px; left: 50%; }
            .circulo-ai { width: 150px; height: 150px; top: 20%; right: 5%; }
            .circulo-ai span { font-size: 55px; }
            .anillo-puntos { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>

    <div class="circuitos"></div>
    <div class="cabeza-ia">
        <div class="ojo"></div>
    </div>
    <div class="anillo-puntos"></div>
    <div class="circulo-ai">
        <span>AI</span>
    </div>

</body>
</html>
